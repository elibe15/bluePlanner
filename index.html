<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
    rel="stylesheet">
  <link rel="icon" href="public/assets/pezluna.webp" type="image/webp">
  <link rel="stylesheet" href="src/style.css">
  <title>Blue Planner: Lista de Tareas</title>
</head>

<body class="font-[Nunito] bg-blue-100">

  <!--Header-->
  <header class="fixed top-0 left-0 right-0 z-50 bg-blue-50 shadow-md shadow-blue-200 p-4">
    <div class="flex flex-row items-center gap-3 justify-center">
      <img src="public/assets/pezluna.webp" alt="dibujo de pez luna" class="size-20">
      <h1 class="text-2xl font-bold text-center text-blue-900">Blue Planner</h1>
    </div>
  </header>

  <!--Main-->
  <main class="pt-30">
    <!------------------------------>
    <!--Sección 1. LISTA DE TAREAS-->
    <!------------------------------>

    <!--Vista de las carpetas-->
    <section id="vistaCarpetas" class="w-[85%] mx-auto pt-5 pb-15">
      <!--Titulo-->
      <article class="flex flex-col gap-2 text-center pb-5">
        <h2 class="text-3xl font-bold text-blue-900">Tareas del día</h2>
        <span class="text-gray-700 font-semibold">¡Vamos paso a paso! (｀・ω・´)ゞ</span>
      </article>
      <!--carpetas-->
      <article>
        <ul id="listaCarpetas" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 items-center justify-center">
          <!--aqui va la lista de carpetas-->
        </ul>
      </article>
    </section>

    <!--Vista de una carpeta abierta (detalle)-->
    <section id="vistaDetalle" class="hidden w-[85%] mx-auto pt-5 pb-15">
      <!--header de la carpeta-->
      <header
        class="flex flex-wrap items-center gap-4 mb-6 bg-blue-50 p-4 rounded-xl shadow-sm shadow-blue-200 backdrop-blur-sm">
        <button id="btnVolver">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="size-6 text-blue-900">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 15.75 3 12m0 0 3.75-3.75M3 12h18" />
          </svg>
        </button>
        <h2 id="tituloCarpeta" class="text-xl font-bold text-blue-900 flex-1">pene polla pipe</h2>
        <button id="btnNuevaTarea"
          class="bg-blue-500 text-white px-5 py-2 rounded-full shadow hover:bg-blue-600 transition-colors cursor-pointer">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="size-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
          </svg>
        </button>
      </header>
      <!--lista de tareas-->
      <ul id="listaTareas" class="space-y-3">
        <li
          class="bg-blue-50 p-6 rounded-tl-xl rounded-br-xl rounded-tr-4xl rounded-bl-4xl flex flex-row items-center justify-between shadow-md shadow-blue-200">

          <button>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
              class="size-6 text-blue-900 hover:scale-110 hover:text-blue-600 transition-all cursor-pointer">
              <path d="M0 0h24v24H0z" fill="none" />
              <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M3 9.4c0-2.24 0-3.36.436-4.216a4 4 0 0 1 1.748-1.748C6.04 3 7.16 3 9.4 3h5.2c2.24 0 3.36 0 4.216.436a4 4 0 0 1 1.748 1.748C21 6.04 21 7.16 21 9.4v5.2c0 2.24 0 3.36-.436 4.216a4 4 0 0 1-1.748 1.748C17.96 21 16.84 21 14.6 21H9.4c-2.24 0-3.36 0-4.216-.436a4 4 0 0 1-1.748-1.748C3 17.96 3 16.84 3 14.6z" />
            </svg>
          </button>

          <h3 class="font-semibold text-gray-700">Codiguear</h3>

          <button>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="currentColor"
              class="size-6 text-blue-900 hover:scale-110 hover:text-blue-600 transition-all cursor-pointer">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
            </svg>

          </button>
        </li>
      </ul>
    </section>
  </main>

  <!--BOTÓN FLOTANTE (CREAR CARPETA)-->
  <aside class="fixed bottom-24 right-4 z-40 lg:bottom-4">
    <button id="btnNuevaCarpeta"
      class="bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-full shadow-2xl transition transform hover:scale-110 flex items-center justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
        class="size-6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
      </svg>
      <span class="sr-only">Nueva Carpeta</span>
    </button>
  </aside>

  <!--Navegación-->
  <nav class="fixed bottom-0 left-0 right-0 z-50
            flex justify-around items-center p-2 gap-3
            lg:top-0 lg:bottom-auto lg:left-0 lg:right-auto lg:h-screen lg:w-24 
            lg:flex-col md:justify-center">

    <!--to do list-->
    <button
      class="p-3 bg-blue-50 hover:bg-blue-300 rounded-xl transition-colors w-full flex justify-center cursor-pointer">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
        class="size-6 text-blue-900 shrink-0">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0ZM3.75 12h.007v.008H3.75V12Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm-.375 5.25h.007v.008H3.75v-.008Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
      </svg>
    </button>

    <!--pomodoro-->
    <button
      class="p-3 bg-blue-50 hover:bg-blue-300 rounded-xl transition-colors w-full flex justify-center cursor-pointer">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="size-6 text-blue-900 shrink-0">
        <path d="M0 0h24v24H0z" fill="none" />
        <path fill="currentColor"
          d="M10 3q-.425 0-.712-.288T9 2t.288-.712T10 1h4q.425 0 .713.288T15 2t-.288.713T14 3zm2.713 10.713Q13 13.425 13 13V9q0-.425-.288-.712T12 8t-.712.288T11 9v4q0 .425.288.713T12 14t.713-.288m-4.2 7.576q-1.638-.713-2.863-1.938t-1.937-2.863T3 13t.713-3.488T5.65 6.65t2.863-1.937T12 4q1.55 0 2.975.5t2.675 1.45l.7-.7q.275-.275.7-.275t.7.275t.275.7t-.275.7l-.7.7Q20 8.6 20.5 10.025T21 13q0 1.85-.713 3.488T18.35 19.35t-2.863 1.938T12 22t-3.488-.712m8.438-3.338Q19 15.9 19 13t-2.05-4.95T12 6T7.05 8.05T5 13t2.05 4.95T12 20t4.95-2.05M12 13" />
      </svg>
    </button>

    <!--kanban-->
    <button
      class="p-3 bg-blue-50 hover:bg-blue-300 rounded-xl transition-colors w-full flex justify-center cursor-pointer">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="size-6 text-blue-900 shrink-0">
        <path d="M0 0h24v24H0z" fill="none" />
        <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 21c3.75 0 5.625 0 6.939-.955a5 5 0 0 0 1.106-1.106C21 17.625 21 15.749 21 12s0-5.625-.955-6.939a5 5 0 0 0-1.106-1.106C17.625 3 15.749 3 12 3s-5.625 0-6.939.955A5 5 0 0 0 3.955 5.06C3 6.375 3 8.251 3 12s0 5.625.955 6.939a5 5 0 0 0 1.106 1.106C6.375 21 8.251 21 12 21m0-14v4m5-4v10M7 7v7" />
      </svg>
    </button>

    <!--cronograma-->
    <button
      class="p-3 bg-blue-50 hover:bg-blue-300 rounded-xl transition-colors w-full flex justify-center cursor-pointer">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
        class="size-6 text-blue-900 shrink-0">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5m-9-6h.008v.008H12v-.008ZM12 15h.008v.008H12V15Zm0 2.25h.008v.008H12v-.008ZM9.75 15h.008v.008H9.75V15Zm0 2.25h.008v.008H9.75v-.008ZM7.5 15h.008v.008H7.5V15Zm0 2.25h.008v.008H7.5v-.008Zm6.75-4.5h.008v.008h-.008v-.008Zm0 2.25h.008v.008h-.008V15Zm0 2.25h.008v.008h-.008v-.008Zm2.25-4.5h.008v.008H16.5v-.008Zm0 2.25h.008v.008H16.5V15Z" />
      </svg>
    </button>
  </nav>

  <script src="src/script.js"></script>
</body>

</html>
